<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维营造 - 筑迹经纬</title>
    <!-- Three.js 库 -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Supabase 客户端库 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase 配置文件 -->
    <script src="/assets/js/supabase-config.js"></script>
    <style>
        /* 页面容器 */
        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: calc(100vh - 140px);
        }
        
        /* 页面标题区域 */
        .page-header {
            text-align: center;
            margin: 40px 0 40px;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .page-title {
            font-size: 2.8rem;
            color: #2c3e50;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #3498db, #2c3e50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-subtitle {
            font-size: 1.2rem;
            color: #7f8c8d;
            max-width: 700px;
            margin: 0 auto 20px;
        }
        
        /* 搜索与筛选区域 */
        .search-and-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0 40px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18"><path fill="%237f8c8d" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>') no-repeat 15px center;
            background-size: 18px;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        .filters-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .building-filter {
            background: white;
            border: 2px solid #e0e0e0;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            color: #2c3e50;
            font-weight: 500;
        }
        
        .building-filter:hover {
            background: #3498db;
            color: white;
            border-color: #3498db;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }
        
        .building-filter.active {
            background: #2c3e50;
            color: white;
            border-color: #2c3e50;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        
        /* 主内容区布局 */
        .main-content-layout {
            display: flex;
            gap: 40px;
            margin-top: 20px;
        }
        
        /* 左侧建筑网格容器 */
        .buildings-grid-container {
            flex: 3;
            min-width: 0;
        }
        
        /* 3D建筑网格 */
        .buildings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .building-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .building-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }
        
        .building-card:hover .building-image img {
            transform: scale(1.05);
        }
        
        .building-image {
            height: 200px;
            overflow: hidden;
            position: relative;
        }
        
        .building-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .building-info {
            padding: 20px;
        }
        
        .building-info h3 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }
        
        .building-location {
            color: #3498db;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        
        .building-location::before {
            content: "📍";
            margin-right: 5px;
        }
        
        .building-period {
            color: #95a5a6;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .building-description {
            color: #7f8c8d;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        
        .tag {
            background: #f0e8df;
            color: #8b0000;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        
        /* 右侧每日推荐侧边栏 */
        .daily-featured-sidebar {
            flex: 1;
            min-width: 300px;
            position: sticky;
            top: 30px;
            height: fit-content;
        }
        
        .featured-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            transition: transform 0.3s ease;
        }
        
        .featured-card:hover {
            transform: translateY(-5px);
        }
        
        .featured-header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .featured-header h3 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .featured-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        
        .featured-image {
            height: 200px;
            overflow: hidden;
        }
        
        .featured-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .featured-card:hover .featured-image img {
            transform: scale(1.05);
        }
        
        .featured-info {
            padding: 20px;
        }
        
        .featured-info h4 {
            color: #2c3e50;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .featured-location, .featured-period {
            color: #3498db;
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        
        .featured-description {
            color: #666;
            line-height: 1.6;
            margin: 15px 0;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .featured-button {
            display: block;
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
            margin-top: 15px;
        }
        
        .featured-button:hover {
            background: #2980b9;
        }
        
        /* 加载动画 */
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e0e0e0;
            border-top-color: #8b0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-content-layout {
                flex-direction: column;
            }
            
            .daily-featured-sidebar {
                min-width: 100%;
                position: static;
            }
            
            .search-and-filters {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: 100%;
            }
            
            .filters-container {
                justify-content: center;
            }
        }
        
        @media (max-width: 768px) {
            .buildings-grid {
                grid-template-columns: 1fr;
            }
            
            .page-title {
                font-size: 2.2rem;
            }
            
            .nav-links {
                gap: 10px;
            }
            
            .nav-links a {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .building-filter {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="main-header">
        <nav class="main-nav">
            <a href="/home.html" class="nav-logo">筑迹经纬</a>
            <div class="nav-links">
                <a href="timeline.html">营造时序</a>
                <a href="architects.html">建筑大师</a>
                <a href="books.html">建筑经典</a>
                <a href="3d-reconstruction.html" style="background: rgba(255,255,255,0.2);">数境重现</a>
            </div>
        </nav>
    </header>

    <!-- 页面内容 -->
    <div class="page-container">
        <div class="page-header">
            <h1 class="page-title">三维营造</h1>
            <p class="page-subtitle">沉浸式探索中国古代建筑瑰宝，体验三维数字化复原的魅力</p>
        </div>

        <!-- 搜索与筛选栏 -->
        <div class="search-and-filters">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索建筑名称、地点、朝代或特征...">
            </div>
            <div class="filters-container">
                <button class="building-filter active" data-type="all">全部建筑</button>
                <button class="building-filter" data-type="宫殿">宫殿建筑</button>
                <button class="building-filter" data-type="园林">园林建筑</button>
                <button class="building-filter" data-type="桥梁">桥梁建筑</button>
                <button class="building-filter" data-type="都城遗址">都城遗址</button>
                <button class="building-filter" data-type="民居">民居建筑</button>
                <button class="building-filter" data-type="塔">塔式建筑</button>
            </div>
        </div>

        <!-- 主内容区：左侧网格 + 右侧每日推荐 -->
        <div class="main-content-layout">
            <!-- 左侧：建筑网格 -->
            <div class="buildings-grid-container">
                <div class="buildings-grid" id="buildings-grid">
                    <!-- 建筑卡片将通过JavaScript动态加载 -->
                </div>
            </div>

            <!-- 右侧：每日推荐 -->
            <aside class="daily-featured-sidebar">
                <div class="featured-card">
                    <div class="featured-header">
                        <h3> 每日一筑</h3>
                        <p>探索今日为您随机推荐的中国建筑瑰宝</p>
                    </div>
                    <div class="featured-image">
                        <img id="dailyFeaturedImage" src="" alt="今日推荐建筑">
                    </div>
                    <div class="featured-info">
                        <h4 id="dailyFeaturedName">建筑名称</h4>
                        <div class="featured-location" id="dailyFeaturedLocation">📍 地点</div>
                        <div class="featured-period" id="dailyFeaturedPeriod">⏳ 年代</div>
                        <p class="featured-description" id="dailyFeaturedDesc">建筑描述...</p>
                        <a href="#" id="dailyFeaturedLink" class="featured-button">🏛️ 探索3D模型</a>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="main-footer">
        <p>© 筑迹经纬 - 中国古代建筑成就可视化系统</p>
    </footer>

    <script src="/assets/js/3d-reconstruction.js"></script>
</body>
</html>
