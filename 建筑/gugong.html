<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京故宫 - 筑迹经纬</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- Three.js 3D库 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* 参考zhaozhou-bridge.html样式 */
        .hero-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 40px; align-items: center; 
            margin: 40px auto; 
            padding: 40px; 
            max-width: 1200px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }

        .achievement-title { 
            font-size: 2.8rem; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            font-weight: 700; 
        }

        .achievement-subtitle { 
            font-size: 1.2rem; 
            color: #7f8c8d; 
            margin-bottom: 20px; 
        }

        .meta-tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin-bottom: 20px; 
        }

        .tag { 
            background: #ecf0f1; 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            color: #2c3e50; 
        }

        .hero-image img { 
            width: 100%; 
            height: 300px; 
            object-fit: cover; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        .three-d-section { 
            max-width: 1200px; 
            margin: 40px auto; 
            padding: 40px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }

        .view-controls { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            margin: 20px 0; 
            justify-content: center; 
        }

        .view-btn { 
            padding: 10px 20px; 
            background: #3498db; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            transition: all 0.3s; 
            font-family: inherit; 
            font-size: 1rem; }

        .view-btn:hover { 
            background: #2980b9; 
            transform: translateY(-2px); 
        }

        .view-btn.active { 
            background: #2c3e50; 
        }

        .model-info { 
            text-align: center; 
            margin: 20px 0; 
            padding: 15px; 
            background: #f8f9fa; 
            border-radius: 8px; 
            font-size: 1.1rem; 
        }

        .model-info .highlight { 
            color: #e74c3c; 
            font-weight: bold; 
            font-size: 1.3rem; 
        }

        .model-container { 
            position: relative; 
            width: 100%; 
            height: 500px; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #e0e0e0; 
            margin-top: 20px; 
        }

        #gugong-3d-canvas { 
            width: 100%; 
            height: 100%; 
            display: block; 
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            font-size: 1.2rem;
            color: #2c3e50;
            flex-direction: column;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 
            0% 
            { transform: rotate(0deg); } 
            100% 
            { transform: rotate(360deg); } 
        }

        @media (max-width: 768px) { 
            .hero-section { 
                grid-template-columns: 1fr; 
                gap: 20px; 
            } 
            
            .achievement-title { 
                font-size: 2.2rem; 
            } 
            
            .model-container { 
                height: 350px; 
            } 
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header class="main-header">
        <nav class="main-nav">
            <a href="../index.html" class="nav-logo">筑迹经纬</a>
            <div class="nav-links">
                <a href="../pages/dimensions/timeline.html" style="background: rgba(255,255,255,0.2);">朝代建筑</a>
                <a href="../pages/dimensions/architects.html">建筑大师</a>
                <a href="../pages/dimensions/books.html">建筑经典</a>
                <a href="../pages/dimensions/3d-reconstruction.html">三维建筑</a>
            </div>
        </nav>
    </header>

    <!-- 英雄区域 -->
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="achievement-title">北京故宫</h1>
            <p class="achievement-subtitle">明清皇家宫殿 · 世界现存最大古代木结构建筑群</p>
            <div class="meta-tags">
                <span class="tag dynasty">明清</span>
                <span class="tag location">北京</span>
                <span class="tag type">宫殿建筑</span>
            </div>
        </div>
        <div class="hero-image">
            <img src="../pages/achievements/images/qing-gugongall.jpg" alt="北京故宫全景">
        </div>
    </section>

    <!-- 3D模型展示 -->
    <section id="three-d" class="three-d-section">
        <h2 class="section-title">故宫三维结构展示</h2>
        <p class="section-subtitle">交互式3D模型，可多角度观察故宫建筑群结构细节</p>
        <div class="view-controls">
            <button class="view-btn active" data-view="front">正面视角</button>
            <button class="view-btn" data-view="side">侧面视角</button>
            <button class="view-btn" data-view="top">俯视视角</button>
            <button class="view-btn" data-view="detail">细节特写</button>
            <button class="view-btn" data-view="reset">重置视角</button>
        </div>
        <div class="model-info">
            故宫占地面积：<span class="highlight">约72万平方米</span>，建筑面积：<span class="highlight">约15万平方米</span>，房屋：<span class="highlight">8707间</span>
        </div>
        <div class="model-container">
            <div class="loading-overlay" id="loading-overlay">
                <div class="loading-spinner"></div>
                <div>模型加载中，请稍候...</div>
            </div>
            <canvas id="gugong-3d-canvas"></canvas>
        </div>
        <div class="model-info">
            <p>提示：点击并拖动可旋转模型，使用鼠标滚轮可缩放，点击上方按钮可切换预设视角。</p>
        </div>
    </section>

    <footer class="main-footer">
        <p>© 筑迹经纬 - 中国古代建筑成就可视化系统</p>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const canvas = document.getElementById('gugong-3d-canvas');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        // 延迟加载示例（实际根据网络情况加载完成后隐藏）
        // 为了与长城页面保持一致，我们在模型加载成功或失败后控制overlay
        function init3DModel() {
            if (typeof THREE !== 'undefined') {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf0f0f0);
                const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
                camera.position.set(0, 15, 30);
                const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
                renderer.setSize(canvas.clientWidth, canvas.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.maxPolarAngle = Math.PI / 2.2;
                controls.minDistance = 10;
                controls.maxDistance = 100;
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
                directionalLight.position.set(20, 30, 10);
                directionalLight.castShadow = true;
                scene.add(directionalLight);
                const modelLoader = new THREE.GLTFLoader();
                modelLoader.load(
                    'https://cdn.zhujijingwei.top/介绍-gugong.glb',
                    function(gltf) {
                        const model = gltf.scene;
                        model.scale.set(30, 30, 30);
                        model.position.y = -1;
                        model.traverse(function(child) {
                            if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
                        });
                        scene.add(model);
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        model.position.sub(center);
                        // 加载成功，隐藏加载遮罩
                        loadingOverlay.style.display = 'none';
                    },
                    undefined, // 移除进度回调，避免动态百分比抽搐
                    function(error) {
                        console.error('模型加载失败：', error);
                        loadingOverlay.innerHTML = '<div class="loading-spinner"></div><div>3D模型加载失败，请刷新页面重试。</div>';
                        // 5秒后自动隐藏错误提示（避免一直遮挡）
                        setTimeout(() => {
                            loadingOverlay.style.display = 'none';
                        }, 5000);
                    }
                );
                function animate() {
                    requestAnimationFrame(animate);
                    controls.update(); // 更新轨道控制
                    renderer.render(scene, camera);
                }
                animate();
                document.querySelectorAll('.view-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        const view = this.getAttribute('data-view');
                        switch(view) {
                            case 'front': camera.position.set(0, 15, 30); break;
                            case 'side': camera.position.set(30, 15, 0); break;
                            case 'top': camera.position.set(0, 40, 0); break;
                            case 'detail': camera.position.set(10, 10, 10); break;
                            case 'reset': camera.position.set(0, 15, 30); break;
                        }
                        camera.lookAt(0, 0, 0);
                        controls.update();
                    });
                });
            }
        }
        
        // 启动3D模型初始化
        init3DModel();
    });
    </script>
</body>
</html>
